<!doctype html>
<html lang="de">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>LeadFlow — Webdesign CRM</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link
      href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@300;400;500;600&family=Syne:wght@600;700;800&display=swap"
      rel="stylesheet"
    />
    <link
      rel="stylesheet"
      href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css"
    />
    <link rel="stylesheet" href="styles.css" />
  </head>
  <body>
    <!-- SIDEBAR -->
    <aside id="sidebar">
      <div class="logo">
        <div class="logo-dot"></div>
        LeadFlow
      </div>

      <!-- Stats -->
      <div class="stat-card">
        <div class="stat-number" id="stat-total">0</div>
        <div class="stat-label">
          <i
            class="fa fa-layer-group"
            style="margin-right: 4px; opacity: 0.5"
          ></i
          >Leads gesamt
        </div>
      </div>
      <div class="stat-card">
        <div
          class="stat-number"
          id="stat-conversion"
          style="
            background: linear-gradient(135deg, #34d99b, #6c8aff);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
          "
        >
          0%
        </div>
        <div class="stat-label">
          <i
            class="fa fa-chart-line"
            style="margin-right: 4px; opacity: 0.5"
          ></i
          >Conversion-Rate
        </div>
      </div>
      <div class="stat-card">
        <div
          class="stat-number"
          id="stat-active"
          style="
            background: linear-gradient(135deg, #6c8aff, #b07fff);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
          "
        >
          0
        </div>
        <div class="stat-label">
          <i class="fa fa-fire" style="margin-right: 4px; opacity: 0.5"></i
          >Aktive Leads
        </div>
      </div>

      <!-- Filter -->
      <div
        style="
          margin-top: 24px;
          margin-bottom: 8px;
          font-size: 0.65rem;
          text-transform: uppercase;
          letter-spacing: 0.1em;
          color: var(--text-muted);
          padding-left: 4px;
        "
      >
        Filter
      </div>

      <button
        class="filter-btn active"
        onclick="setFilter('all')"
        id="filter-all"
      >
        <i class="fa fa-border-all" style="width: 14px; opacity: 0.7"></i> Alle
        <span class="filter-count" id="fc-all">0</span>
      </button>
      <button class="filter-btn" onclick="setFilter('Neu')" id="filter-Neu">
        <i class="fa fa-circle" style="width: 14px; color: var(--blue)"></i> Neu
        <span class="filter-count" id="fc-Neu">0</span>
      </button>
      <button
        class="filter-btn"
        onclick="setFilter('In Bearbeitung')"
        id="filter-In Bearbeitung"
      >
        <i class="fa fa-circle" style="width: 14px; color: var(--purple)"></i>
        In Bearbeitung
        <span class="filter-count" id="fc-In Bearbeitung">0</span>
      </button>
      <button
        class="filter-btn"
        onclick="setFilter('Kontaktiert')"
        id="filter-Kontaktiert"
      >
        <i class="fa fa-circle" style="width: 14px; color: var(--yellow)"></i>
        Kontaktiert
        <span class="filter-count" id="fc-Kontaktiert">0</span>
      </button>
      <button
        class="filter-btn"
        onclick="setFilter('Warten auf Antwort')"
        id="filter-Warten auf Antwort"
      >
        <i class="fa fa-circle" style="width: 14px; color: var(--orange)"></i>
        Warten auf Antwort
        <span class="filter-count" id="fc-Warten auf Antwort">0</span>
      </button>
      <button
        class="filter-btn"
        onclick="setFilter('Gewonnen')"
        id="filter-Gewonnen"
      >
        <i class="fa fa-circle" style="width: 14px; color: var(--green)"></i>
        Gewonnen
        <span class="filter-count" id="fc-Gewonnen">0</span>
      </button>
      <button
        class="filter-btn"
        onclick="setFilter('Abgelehnt')"
        id="filter-Abgelehnt"
      >
        <i class="fa fa-circle" style="width: 14px; color: var(--red)"></i>
        Abgelehnt
        <span class="filter-count" id="fc-Abgelehnt">0</span>
      </button>

      <!-- Footer -->
      <div
        style="
          margin-top: auto;
          font-size: 0.68rem;
          color: var(--text-muted);
          line-height: 1.6;
        "
      >
        <div style="margin-bottom: 4px">
          <i class="fa fa-database" style="margin-right: 5px; opacity: 0.4"></i
          >Daten aus Firebase RTDB
        </div>
        <button
          onclick="exportCSV()"
          style="
            background: none;
            border: 1px solid var(--border);
            color: var(--text-muted);
            padding: 5px 10px;
            border-radius: 7px;
            font-size: 0.7rem;
            cursor: pointer;
            transition: all 0.18s;
            width: 100%;
            font-family: &quot;DM Sans&quot;;
          "
          onmouseover="this.style.color = 'var(--text)'"
          onmouseout="this.style.color = 'var(--text-muted)'"
        >
          <i class="fa fa-download" style="margin-right: 5px"></i>CSV Export
        </button>
      </div>
    </aside>

    <!-- MAIN -->
    <main id="main">
      <div class="topbar">
        <div>
          <div class="page-title syne">Leads</div>
          <div class="page-subtitle" id="subtitle">0 Einträge</div>
        </div>
        <button class="btn-add" onclick="openModal()">
          <i class="fa fa-plus"></i> Neuer Lead
        </button>
      </div>

      <div id="leads-grid">
        <div id="empty-state">
          <i class="fa fa-inbox"></i>
          <p>Noch keine Leads. Füge deinen ersten hinzu!</p>
        </div>
      </div>
    </main>

    <!-- MODAL -->
    <div id="modal-overlay" onclick="overlayClick(event)">
      <div id="modal">
        <div class="modal-title syne" id="modal-title">Neuer Lead</div>

        <div class="field">
          <label
            ><i
              class="fa fa-building"
              style="margin-right: 5px; opacity: 0.5"
            ></i
            >Firmenname *</label
          >
          <input type="text" id="f-company" placeholder="z.B. Muster GmbH" />
        </div>
        <div class="field">
          <label
            ><i
              class="fa fa-map-marker-alt"
              style="margin-right: 5px; opacity: 0.5"
            ></i
            >Google Maps Link</label
          >
          <input
            type="url"
            id="f-maps"
            placeholder="https://maps.google.com/..."
          />
        </div>
        <div class="field">
          <label
            ><i class="fa fa-globe" style="margin-right: 5px; opacity: 0.5"></i
            >Website-Status</label
          >
          <select id="f-website">
            <option value="none">— nicht ausgewählt —</option>
            <option value="old">Veraltete Website</option>
            <option value="none2">Keine Website</option>
            <option value="modern">Moderne Website</option>
            <option value="build">In Aufbau</option>
          </select>
        </div>
        <div class="field">
          <label
            ><i class="fa fa-tag" style="margin-right: 5px; opacity: 0.5"></i
            >Lead-Status</label
          >
          <select id="f-status">
            <option value="Neu">Neu (Lead gefunden)</option>
            <option value="In Bearbeitung">In Bearbeitung</option>
            <option value="Kontaktiert">Kontaktiert</option>
            <option value="Warten auf Antwort">Warten auf Antwort</option>
            <option value="Gewonnen">Gewonnen ✓</option>
            <option value="Abgelehnt">Abgelehnt</option>
          </select>
        </div>
        <div class="field">
          <label
            ><i class="fa fa-link" style="margin-right: 5px; opacity: 0.5"></i
            >Vorschau-URL / Notiz</label
          >
          <textarea
            id="f-note"
            placeholder="Vorschau-URL oder interne Notizen..."
          ></textarea>
        </div>

        <input type="hidden" id="f-id" />
        <input type="hidden" id="f-date" />

        <div class="modal-actions">
          <button class="btn-cancel" onclick="closeModal()">Abbrechen</button>
          <button class="btn-save" onclick="saveLead()">
            <i class="fa fa-check" style="margin-right: 6px"></i>Speichern
          </button>
        </div>
      </div>
    </div>

    <!-- DELETE CONFIRM -->
    <div id="delete-confirm">
      <div class="delete-box">
        <i class="fa fa-trash-alt"></i>
        <h3>Lead löschen?</h3>
        <p>Diese Aktion kann nicht rückgängig gemacht werden.</p>
        <button class="btn-del-confirm" id="btn-del-yes">Löschen</button>
        <button class="btn-cancel" onclick="closeDelete()">Abbrechen</button>
      </div>
    </div>

    <script type="module" src="app.js"></script>
  </body>
</html>
